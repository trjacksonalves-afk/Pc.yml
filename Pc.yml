name: Windows Cloud PC - Chrome Remote Desktop FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: System Info
        run: systeminfo

      # 🔊 ATIVAR ÁUDIO E INSTALAR DRIVER VIRTUAL
      - name: Enable Audio
        run: |
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service Audiosrv
          Invoke-WebRequest https://download.vb-audio.com/Download_Cables/VBCABLE_Driver_Pack43.zip -OutFile cable.zip
          Expand-Archive cable.zip -DestinationPath cable
          Start-Process "powershell.exe" -ArgumentList "-ExecutionPolicy Bypass -File cable/VBCABLE_Setup_x64.exe" -Wait

      # 📥 BAIXAR E INSTALAR CHROME REMOTE DESKTOP
      - name: Setup Remote Desktop
        run: |
          Invoke-WebRequest https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi -OutFile crd.msi
          Start-Process msiexec.exe -ArgumentList "/i crd.msi /quiet /norestart" -Wait

      # 🔐 INICIAR ACESSO REMOTO
      - name: Start Remote Desktop
        run: |
          $env:PROGRAMFILES(X86) = ${env:ProgramFiles(x86)}
          & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0Aci98E_l-s4kYRDGGYh6MlqtOhG8Kt2Haybo8uhbKjhETko-a6psmy4qXENwnuNWcVUneQ" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=CloudPC-Mateus

      # ⏱️ MANTER ONLINE
      - name: Keep Alive
        run: |
          Write-Host "PC online... Mantenha esta aba aberta!"
          Start-Sleep -Seconds 21600
