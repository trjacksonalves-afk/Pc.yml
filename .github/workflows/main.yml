name: Windows Cloud PC - AnyDesk WORKING

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable Audio
        run: |
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service Audiosrv

      - name: Install VC++
        run: |
          Invoke-WebRequest https://aka.ms/vs/17/release/vc_redist.x64.exe -OutFile vc.exe
          Start-Process vc.exe -ArgumentList "/install /quiet /norestart" -Wait

      - name: Download AnyDesk
        run: |
          Invoke-WebRequest https://download.anydesk.com/AnyDesk.exe -OutFile AnyDesk.exe

      - name: Install AnyDesk (Service Mode)
        run: |
          Start-Process .\AnyDesk.exe -ArgumentList "--install C:\AnyDesk --start-with-win --silent" -Wait

      - name: Start AnyDesk Service
        run: |
          Start-Service AnyDesk -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 10

      - name: Force Start GUI
        run: |
          Start-Process "C:\AnyDesk\AnyDesk.exe"
          Start-Sleep -Seconds 15

      - name: Set Password
        run: |
          & "C:\AnyDesk\AnyDesk.exe" --set-password 123456

      # 🔥 MÉTODO QUE FUNCIONA DE VERDADE
      - name: Get AnyDesk ID (FINAL FIX)
        run: |
          Write-Host "Pegando ID do AnyDesk..."
          
          for ($i=0; $i -lt 10; $i++) {

            $id = & "C:\AnyDesk\AnyDesk.exe" --get-id 2>$null

            if ($id -and $id.Length -gt 5) {
              Write-Host "=================================="
              Write-Host "SEU ID ANYDESK:"
              Write-Host $id
              Write-Host "SENHA: 123456"
              Write-Host "=================================="
              exit 0
            }

            Write-Host "Tentando novamente..."
            Start-Sleep -Seconds 10
          }

          Write-Host "❌ Não foi possível obter o ID automaticamente."
          Write-Host "➡️ Abra o AnyDesk manualmente no acesso remoto."
